name: Format Check
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Check formatting
        run: |
          julia -e '
            using Pkg; Pkg.add("JuliaFormatter")
            using JuliaFormatter
            ok = format(["src", "ext", "test", "examples", "docs"]; verbose=true)
            if !ok
              @error "Code is not formatted. Run JuliaFormatter.format(\".\") locally."
              exit(1)
            end'
