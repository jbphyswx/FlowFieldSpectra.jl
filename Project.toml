name = "FlowFieldSpectra"
uuid = "e5f08a8b-40ae-41d5-97fc-c483fb8f16ad"
version = "0.1.0"
authors = ["Jordan Benjamin <jordantbenjamin@gmail.com>"]


[workspace]
projects = ["test", "docs", "examples", "gpu", "benchmark"]


[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"

[weakdeps]
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
FFTW = "7a1cc6ca-52ef-59f5-83cd-3a7055c09341"
FINUFFT = "d8beea63-0952-562e-9c6a-8e8ef7364055"
FastSphericalHarmonics = "d335c211-7587-445e-a753-f0b1fb7e445f"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
NUFSHT = "e99b67a3-9706-455a-90e2-85b195a33206"
OhMyThreads = "67456a42-1dca-4109-a031-0a68de7e3ad5"

[extensions]
FlowFieldSpectraCairoMakieExt = "CairoMakie"
FlowFieldSpectraFFTWExt = "FFTW"
FlowFieldSpectraFINUFFTExt = "FINUFFT"
FlowFieldSpectraFastSphericalHarmonicsExt = "FastSphericalHarmonics"
FlowFieldSpectraKernelAbstractionsExt = "KernelAbstractions"
FlowFieldSpectraNUFSHTExt = "NUFSHT"
FlowFieldSpectraOhMyThreadsExt = "OhMyThreads"

[extras]
NUFSHT = "e99b67a3-9706-455a-90e2-85b195a33206"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["NUFSHT", "Test"]


[compat]
CairoMakie = "0.15"
FFTW = "1"
FINUFFT = "3"
FastSphericalHarmonics = "1"
KernelAbstractions = "0.9"
LinearAlgebra = "1.10"
NUFSHT = "0.1"
OhMyThreads = "0.8"
PrecompileTools = "1.2, 1.3"
Test = "1"
# Floor is 1.11 because the package uses Project.toml `[sources]` and `[workspace]` (both added in
# Julia 1.11) to pull in the as-yet-unregistered NUFSHT.jl. Once NUFSHT (and friends) are in the
# General registry this can drop back to 1.10 (possibly 1.9) — nothing in the source needs 1.11.
julia = "1.11"



[sources]
NUFSHT = { url = "https://github.com/jbphyswx/NUFSHT.jl" }